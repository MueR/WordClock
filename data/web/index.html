<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WordClock Setup</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<h1>WordClock Setup</h1>
<p class="sub">Select a network and enter the password to connect.</p>

<div id="main">
  <form id="connect-form">
    <label for="ssid">Network (SSID)</label>
    <input type="text" id="ssid" name="ssid" placeholder="Select below or type manually" autocomplete="off">
    <label for="pass">Password</label>
    <input type="password" id="pass" name="pass" placeholder="Leave blank for open networks" autocomplete="off">
    <button type="submit" class="btn btn-primary">Save &amp; Connect</button>
  </form>

  <hr>

  <button id="reset-btn" class="btn btn-danger">Reset saved credentials</button>

  <h2>
    Available networks
    <button id="refresh-btn" class="btn-icon" title="Refresh">&#8635;</button>
  </h2>
  <div id="networks"><p class="muted">Scanning&hellip;</p></div>
</div>

<script src="/app.js"></script>
</body>
</html>
